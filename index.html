<head>

  <title>CYE — Liquid Cello</title>
  <style>
    body, html {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0F172A;
    }
    body {
      touch-action: none;
    }
    #canvas {
      position: fixed;
      top: 0; right: 0; bottom: 0; left: 0;
    }
    #credit {
      position: fixed;
      bottom: 16px;
      right: 16px;
      color: rgba(255,255,255,0.3);
      font-family: sans-serif;
      font-size: 11px;
      text-decoration: none;
    }
    #credit:hover {
      color: rgba(255,255,255,0.6);
    }
    #rain-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(8, 145, 178, 0.2);
      border: 1px solid rgba(8, 145, 178, 0.5);
      color: #0891B2;
      font-family: sans-serif;
      font-size: 13px;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(4px);
    }
    #rain-toggle:hover {
      background: rgba(8, 145, 178, 0.4);
      color: #fff;
    }
  </style>
</head>
