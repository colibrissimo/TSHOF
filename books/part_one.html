<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Sharpened History of Flatland — Part One</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0F172A;
      color: rgba(255,255,255,0.85);
      font-family: Georgia, 'Times New Roman', serif;
      line-height: 1.8;
      padding: 0 0 80px;
    }

    #topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15,23,42,0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(8,145,178,0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 32px;
    }

    #topbar a.back {
      color: #0891B2;
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      text-decoration: none;
      transition: color 0.2s;
    }
    #topbar a.back:hover { color: #F97316; }

    #topbar .title {
      font-family: Georgia, serif;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
    }

    #topbar a.next-part {
      color: #F97316;
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      text-decoration: none;
      transition: color 0.2s;
    }
    #topbar a.next-part:hover { color: #0891B2; }

    #content {
      max-width: 720px;
      margin: 56px auto 0;
      padding: 0 24px;
    }

    #content h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 400;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.9);
      text-shadow: 0 2px 24px rgba(8,145,178,0.5);
      margin-bottom: 0.5em;
    }

    #content h2 {
      font-size: 1.25rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: #F97316;
      margin: 2.5em 0 0.6em;
      border-bottom: 1px solid rgba(249,115,22,0.2);
      padding-bottom: 0.3em;
    }

    #content h3 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #0891B2;
      margin: 2em 0 0.5em;
      text-transform: uppercase;
    }

    #content p {
      margin: 0 0 1.2em;
      color: rgba(255,255,255,0.8);
    }

    #content em { color: rgba(255,255,255,0.65); font-style: italic; }
    #content strong { color: #F97316; font-weight: 600; }

    #content hr {
      border: none;
      border-top: 1px solid rgba(8,145,178,0.25);
      margin: 2.5em 0;
    }

    #content blockquote {
      border-left: 3px solid #0891B2;
      padding: 0.5em 1.2em;
      margin: 1.5em 0;
      color: rgba(255,255,255,0.6);
      font-style: italic;
    }

    #content code {
      font-family: 'Courier New', monospace;
      font-size: 0.88em;
      background: rgba(8,145,178,0.12);
      color: #0891B2;
      padding: 2px 6px;
      border-radius: 3px;
    }

    #content pre {
      background: rgba(8,145,178,0.08);
      border: 1px solid rgba(8,145,178,0.2);
      border-radius: 6px;
      padding: 1em;
      overflow-x: auto;
      margin: 1.5em 0;
    }
    #content pre code { background: none; padding: 0; }

    #content ul, #content ol {
      margin: 0 0 1.2em 1.5em;
      color: rgba(255,255,255,0.8);
    }
    #content li { margin-bottom: 0.4em; }

    #content a {
      color: #0891B2;
      text-decoration: none;
      border-bottom: 1px dotted rgba(8,145,178,0.5);
      transition: color 0.2s;
    }
    #content a:hover { color: #F97316; }

    #loading {
      text-align: center;
      color: rgba(8,145,178,0.6);
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 0.82rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      padding: 80px 0;
    }

    #error {
      display: none;
      text-align: center;
      color: #F97316;
      font-family: 'Segoe UI', Arial, sans-serif;
      padding: 80px 24px;
    }
  </style>
</head>
<body>

  <div id="topbar">
    <a class="back" href="/">&#8592; Back</a>
    <span class="title">The Sharpened History of Flatland</span>
    <a class="next-part" href="part_two.html">Part Two &#8594;</a>
  </div>

  <div id="content">
    <div id="loading">Loading&hellip;</div>
    <div id="error">Could not load the text. Please try refreshing.</div>
    <div id="md-output"></div>
  </div>

  <script>
    const mdPath = './Part_one_md_files/The_Sharpened_History_of_Flatland_part_one.md';

    marked.setOptions({
      gfm: true,
      breaks: false,
    });

    fetch(mdPath)
      .then(r => {
        if (!r.ok) throw new Error(r.statusText);
        return r.text();
      })
      .then(text => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('md-output').innerHTML = marked.parse(text);
      })
      .catch(err => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        console.error('Error loading markdown:', err);
      });
  </script>

</body>
</html>
